<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Atlas — The autonomous engineer for API workflows</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#ffffff;
    --text-1:#111;
    --text-2:#555;
    --text-3:#999;
    --indigo:#5B6EEA;
    --indigo-soft:#f0f2ff;
  }
  html,body{
    height:100%;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;
    background:#ffffff;color:var(--text-1);line-height:1.5;
  }
  body{overflow-x:hidden}

  /* ── FULL-VIEWPORT FIXED CANVAS ───────────────────────────── */
  #bg{
    position:fixed;
    inset:0;
    width:100vw;height:100vh;
    z-index:0;
    pointer-events:none;
    background:#ffffff;
  }

  /* Layer everything else above the canvas */
  .content{position:relative;z-index:2;pointer-events:none}
  .content > * {pointer-events:auto}

  /* ── TOP NAV ─────────────────────────────────────────────── */
  .nav{
    max-width:1200px;margin:0 auto;
    padding:22px 28px;
    display:flex;align-items:center;justify-content:space-between;
  }
  .brand{display:flex;align-items:center;gap:9px;font-size:15px;font-weight:600;letter-spacing:-0.01em}
  .brand-mark{width:22px;height:22px;border-radius:6px;background:linear-gradient(135deg,#5B6EEA,#8B5CF6);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700}
  .nav-links{display:flex;gap:24px;font-size:13px;color:var(--text-2)}
  .nav-links a{color:inherit;text-decoration:none}
  .nav-links a:hover{color:var(--text-1)}
  .nav-cta{font-size:13px;font-weight:500;background:#E0531F;color:#fff;padding:8px 14px;border-radius:7px;text-decoration:none;transition:background .15s}
  .nav-cta:hover{background:#C44419}
  @media (max-width:680px){.nav-links{display:none}}

  /* ── HERO ─────────────────────────────────────────────────── */
  .hero{
    min-height:calc(100vh - 80px);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:60px 28px 40px;text-align:center;
    max-width:900px;margin:0 auto;
  }
  .eyebrow{
    display:inline-block;font-size:11px;font-weight:600;letter-spacing:.1em;
    text-transform:uppercase;color:var(--indigo);
    background:var(--indigo-soft);padding:6px 12px;border-radius:999px;
    margin-bottom:22px;
  }
  .hero h1{
    font-size:64px;font-weight:600;letter-spacing:-0.03em;
    line-height:1.05;color:var(--text-1);margin-bottom:22px;
  }
  .hero h1 .accent{color:inherit}
  .hero p{
    font-size:18px;color:var(--text-2);
    max-width:580px;margin:0 auto 32px;line-height:1.55;
  }
  .hero-cta{display:inline-flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center}
  .btn{
    font-family:inherit;font-size:14px;font-weight:500;
    padding:12px 20px;border-radius:8px;border:none;cursor:pointer;
    transition:all .15s;text-decoration:none;display:inline-block;
  }
  .btn-primary{background:#E0531F;color:#fff}
  .btn-primary:hover{background:#C44419;transform:translateY(-1px)}
  .btn-ghost{background:rgba(255,255,255,.7);color:var(--text-2);border:1px solid #e4e4e8;backdrop-filter:blur(4px)}
  .btn-ghost:hover{color:var(--text-1);border-color:#bbb}
  .scroll-cue{
    margin-top:48px;font-size:12px;color:var(--text-3);letter-spacing:.06em;
    display:flex;flex-direction:column;align-items:center;gap:6px;
    animation:float 2.2s ease-in-out infinite;
  }
  @keyframes float{0%,100%{transform:translateY(0);opacity:.6}50%{transform:translateY(4px);opacity:1}}
  @media (max-width:600px){.hero h1{font-size:38px}.hero p{font-size:15px}}

  /* ── SCROLL SPACER (gives the build room to play out) ───── */
  .spacer{height:220vh;pointer-events:none}

  /* ── VIDEO CARD FLOATING OVER THE GRAPH ──────────────────── */
  .video-section{
    position:relative;
    width:100vw;
    min-height:100vh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:80px 24px;
    background:transparent;  /* graph shows through */
  }
  .video-caption{
    font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;
    color:var(--indigo);
    background:var(--indigo-soft);
    padding:6px 12px;border-radius:999px;
    margin-bottom:18px;
  }
  .video-title{
    font-size:36px;font-weight:600;letter-spacing:-0.025em;line-height:1.15;
    color:var(--text-1);
    max-width:640px;text-align:center;
    margin-bottom:28px;
  }
  .video-title .accent{
    background:linear-gradient(135deg,#5B6EEA,#8B5CF6);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  /* Browser-window-style video frame floating over the graph */
  .video-window{
    position:relative;
    width:min(1000px, 92vw);
    border-radius:14px;
    overflow:hidden;
    background:#fff;
    box-shadow:
      0 40px 100px rgba(17,17,17,0.22),
      0 16px 40px rgba(91,110,234,0.10),
      0 0 0 1px rgba(17,17,17,0.06);
    transition:transform .3s cubic-bezier(.4,0,.2,1), box-shadow .3s ease;
  }
  .video-window:hover{
    transform:translateY(-3px);
    box-shadow:
      0 50px 120px rgba(17,17,17,0.26),
      0 20px 48px rgba(91,110,234,0.16),
      0 0 0 1px rgba(17,17,17,0.06);
  }
  .window-chrome{
    display:flex;align-items:center;gap:14px;
    padding:11px 14px;
    background:#f4f4f6;
    border-bottom:1px solid #e8e8ec;
  }
  .traffic-lights{display:flex;gap:7px;flex-shrink:0}
  .traffic-lights span{
    width:12px;height:12px;border-radius:50%;
    box-shadow:inset 0 0 0 0.5px rgba(0,0,0,0.08);
  }
  .traffic-lights span:nth-child(1){background:#ff5f57}
  .traffic-lights span:nth-child(2){background:#febc2e}
  .traffic-lights span:nth-child(3){background:#28c840}
  .url-bar{
    flex:1;max-width:340px;margin:0 auto;
    height:26px;border-radius:7px;
    background:#fff;border:1px solid #e4e4e8;
    display:flex;align-items:center;justify-content:center;gap:6px;
    font-size:12px;color:#888;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  }
  .url-bar svg{flex-shrink:0;opacity:.55}
  .window-spacer{width:54px;flex-shrink:0}  /* balance the traffic lights */
  .window-body{
    position:relative;
    aspect-ratio:16/9;
    background:
      radial-gradient(circle at 30% 20%, rgba(91,110,234,.22), transparent 60%),
      radial-gradient(circle at 80% 80%, rgba(139,92,246,.18), transparent 55%),
      linear-gradient(180deg, #0b0c12 0%, #14151f 100%);
    cursor:pointer;
    overflow:hidden;
  }
  .window-body::after{
    content:"";
    position:absolute;inset:0;
    background-image:
      linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px);
    background-size:48px 48px;
    pointer-events:none;
    mask-image:radial-gradient(circle at center, #000 35%, transparent 75%);
    -webkit-mask-image:radial-gradient(circle at center, #000 35%, transparent 75%);
  }
  .play-btn{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:88px;height:88px;border-radius:50%;
    border:1px solid rgba(255,255,255,.22);
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;color:#fff;
    transition:all .25s cubic-bezier(.4,0,.2,1);
    z-index:2;
  }
  .play-btn::before{
    content:"";
    position:absolute;inset:-2px;border-radius:50%;
    background:conic-gradient(from 180deg, #5B6EEA, #8B5CF6, #5B6EEA);
    opacity:0;transition:opacity .25s;
    z-index:-1;
    filter:blur(16px);
  }
  .video-window:hover .play-btn{
    background:rgba(255,255,255,.14);
    border-color:rgba(255,255,255,.32);
    transform:translate(-50%,-50%) scale(1.06);
  }
  .video-window:hover .play-btn::before{opacity:.7}
  .play-btn svg{margin-left:4px}
  .video-meta{
    margin-top:22px;
    font-size:13px;color:var(--text-3);
    display:flex;align-items:center;gap:10px;
  }
  .video-meta::before, .video-meta::after{
    content:"";display:inline-block;width:24px;height:1px;background:#e4e4e8;
  }
  @media (max-width:600px){
    .video-title{font-size:24px;margin-bottom:22px}
    .play-btn{width:64px;height:64px}
    .play-btn svg{width:22px;height:22px}
  }

  /* ── PROGRESS BAR (subtle scroll indicator) ──────────────── */
  #progress{
    position:fixed;top:0;left:0;height:2px;width:0;
    background:linear-gradient(90deg,#5B6EEA,#8B5CF6);
    z-index:10;transition:width .08s linear;
    box-shadow:0 0 8px rgba(91,110,234,.4);
  }
</style>
</head>
<body>

<canvas id="bg"></canvas>
<div id="progress"></div>

<div class="content">
  <nav class="nav">
    <a class="brand" href="#"><div class="brand-mark">A</div>Atlas</a>
    <div class="nav-links">
      <a href="#">Product</a>
      <a href="#">Docs</a>
      <a href="#">Pricing</a>
    </div>
    <a class="nav-cta" href="#">Get early access</a>
  </nav>

  <section class="hero">
    <h1>The autonomous engineer<br/>for <span class="accent">your API workflows</span></h1>
    <p>An always-on cloud-native agent that builds, tests, governs and scales APIs across the org.</p>
    <div class="hero-cta">
      <button class="btn btn-primary">Get early access</button>
      <button class="btn btn-ghost">See it in action ↓</button>
    </div>
    <div class="scroll-cue">scroll<br/>↓</div>
  </section>

  <div class="spacer"></div>

  <section class="video-section">
    <div class="video-caption">When everything connects</div>
    <h2 class="video-title">See Atlas act on the <span class="accent">context graph</span></h2>
    <div class="video-window" role="button" tabindex="0" aria-label="Play walkthrough">
      <div class="window-chrome">
        <div class="traffic-lights"><span></span><span></span><span></span></div>
        <div class="url-bar">
          <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="7" width="10" height="7" rx="1.5"/><path d="M5.5 7V4.5a2.5 2.5 0 0 1 5 0V7"/></svg>
          atlas.app/walkthrough
        </div>
        <div class="window-spacer"></div>
      </div>
      <div class="window-body">
        <button class="play-btn" aria-label="Play video">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </button>
      </div>
    </div>
    <div class="video-meta">2 min walkthrough</div>
  </section>
</div>

<script>
// ── Canvas setup ─────────────────────────────────────────────
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
const DPR = window.devicePixelRatio || 1;
let CW = 0, CH = 0;

function setCanvasSize(){
  CW = window.innerWidth;
  CH = window.innerHeight;
  canvas.width = Math.round(CW * DPR);
  canvas.height = Math.round(CH * DPR);
  canvas.style.width = CW + 'px';
  canvas.style.height = CH + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
setCanvasSize();

// ── Palette (pastel team colors, like the inspired reference) ──
const COLS = {
  neutral:  {f:'#f1f1f4', s:'#c4c4c9'},
  agent:    {f:'#dde6fa', s:'#4F7FE8'},
  api:      {f:'#cdf2e2', s:'#10B981'},
  workflow: {f:'#fde5cf', s:'#F97316'},
  incident: {f:'#fbd5e6', s:'#EC4899'},
  knowledge:{f:'#e0d4f8', s:'#8B5CF6'},
  infra:    {f:'#cfeff5', s:'#06B6D4'},
  observ:   {f:'#fbe9c4', s:'#F59E0B'},
};
const CATS = ['agent','api','workflow','knowledge','infra','observ','incident'];

// ── Math helpers ─────────────────────────────────────────────
const lerp = (a,b,t) => a + (b - a) * t;
const clamp = (v,a,b) => Math.max(a, Math.min(b, v));
const smoothstep = (a,b,t) => { t = clamp((t - a) / (b - a), 0, 1); return t * t * (3 - 2 * t); };
const eio = t => t < .5 ? 2*t*t : -1 + (4 - 2*t)*t;

// hex blend helper
function hex2rgb(h){
  const m = h.replace('#','');
  return [parseInt(m.slice(0,2),16), parseInt(m.slice(2,4),16), parseInt(m.slice(4,6),16)];
}
function mixHex(h1, h2, t){
  const c1 = hex2rgb(h1), c2 = hex2rgb(h2);
  return `rgb(${Math.round(lerp(c1[0],c2[0],t))},${Math.round(lerp(c1[1],c2[1],t))},${Math.round(lerp(c1[2],c2[2],t))})`;
}

// Deterministic pseudo-random per index — gives stable scatter positions
function srand(i, salt){
  const x = Math.sin(i * 12.9898 + salt * 78.233) * 43758.5453;
  return x - Math.floor(x);
}

// ── 3D sphere helpers ─────────────────────────────────────────
// Fibonacci sphere: evenly-distributed points on a unit sphere.
function fibonacciSphere(n){
  const pts = [];
  const phi = Math.PI * (3 - Math.sqrt(5));  // golden angle
  for(let i = 0; i < n; i++){
    const y = 1 - (i / (n - 1)) * 2;
    const radius = Math.sqrt(1 - y * y);
    const theta = phi * i;
    pts.push({ px: Math.cos(theta) * radius, py: y, pz: Math.sin(theta) * radius });
  }
  return pts;
}

// Connect each node to its K nearest neighbours in 3D — gives the
// triangulated wireframe look from a geodesic sphere.
function nearestNeighbourEdges(nodes, K){
  const edges = [];
  const seen = new Set();
  for(let i = 0; i < nodes.length; i++){
    const d = [];
    for(let j = 0; j < nodes.length; j++){
      if(j === i) continue;
      const dx = nodes[i].px - nodes[j].px;
      const dy = nodes[i].py - nodes[j].py;
      const dz = nodes[i].pz - nodes[j].pz;
      d.push([j, dx*dx + dy*dy + dz*dz]);
    }
    d.sort((a, b) => a[1] - b[1]);
    for(let k = 0; k < K && k < d.length; k++){
      const j = d[k][0];
      const key = i < j ? `${i}-${j}` : `${j}-${i}`;
      if(seen.has(key)) continue;
      seen.add(key);
      edges.push([i, j]);
    }
  }
  return edges;
}

// ── Build sphere nodes + scatter origins ─────────────────────
// Three tiers (primary / secondary / tertiary) give the orb the same
// visual hierarchy as the inspired context-graph animation: a few
// large anchor nodes, a band of mediums, and a cloud of small dots.
function buildNodes(){
  const N = 90;   // slightly fewer nodes so each can be more visible
  const sphere = fibonacciSphere(N);

  // 8 primaries, spread evenly through the Fibonacci order
  // (each gets a distinct team colour).
  const PRIMARY_COUNT = 8;
  const PRIMARY_STEP = Math.floor(N / PRIMARY_COUNT);
  const PRIMARY_COLS = ['agent','api','workflow','knowledge','infra','observ','incident','agent'];

  // Spread the scatter across the full viewport width. On wide screens
  // we deliberately let a fraction of nodes spill past the edges so the
  // hero feels expansive rather than centred.
  const aspect = CW / CH;
  const SCATTER_X = aspect > 1 ? Math.min(aspect * 0.5, 0.95) : 0.55;
  const SCATTER_Y = aspect < 1 ? Math.min((1/aspect) * 0.5, 0.95) : 0.55;

  const nodes = sphere.map((p, i) => {
    const primaryIdx = (i % PRIMARY_STEP === 0) ? Math.floor(i / PRIMARY_STEP) : -1;
    const isPrimary  = primaryIdx >= 0 && primaryIdx < PRIMARY_COUNT;
    const isSecondary = !isPrimary && (i % 4 === 1);

    const a = srand(i, 1) * Math.PI * 2;
    // Higher minimum radius so the scatter leaves the centre clear for
    // the hero heading + subtext rather than overlapping them.
    const rad = 0.55 + srand(i, 2) * 0.40;

    return {
      px: p.px, py: p.py, pz: p.pz,
      sx: 0.5 + Math.cos(a) * rad * SCATTER_X,
      sy: 0.5 + Math.sin(a) * rad * SCATTER_Y,
      fx: srand(i, 3) * Math.PI * 2,
      fy: srand(i, 4) * Math.PI * 2,
      baseR: isPrimary   ? 12 + srand(i, 5) * 4 :        // 12–16
             isSecondary ? 7  + srand(i, 5) * 2 :        // 7–9
                           4  + srand(i, 5) * 1.8,       // 4–5.8
      c: isPrimary ? PRIMARY_COLS[primaryIdx] : CATS[(i * 3) % CATS.length],
      tier: isPrimary ? 2 : (isSecondary ? 1 : 0),
    };
  });
  const edges = nearestNeighbourEdges(nodes, 5);
  return { nodes, edges };
}

let G = buildNodes();
let rotY = 0;   // sphere rotation around Y axis
let rotX = 0;   // slight tilt over X axis

// ── Scroll → progress (0 = scattered, 1 = settled orb) ───────
let progress = 0;
function updateProgress(){
  const spacer = document.querySelector('.spacer');
  if(!spacer){ progress = 0; return; }
  const r = spacer.getBoundingClientRect();
  const vh = window.innerHeight;
  const total = r.height + vh;
  const into = vh - r.top;
  progress = clamp(into / total, 0, 1);
  document.getElementById('progress').style.width = (progress * 100) + '%';
}
updateProgress();
window.addEventListener('scroll', updateProgress, {passive:true});
window.addEventListener('resize', updateProgress, {passive:true});

// ── Render loop ──────────────────────────────────────────────
let pulse = 0;

function draw(){
  pulse++;
  const t = progress;

  // ── Persistent light background ────────────────────────────
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, CW, CH);

  // Dot grid
  ctx.fillStyle = 'rgba(17,17,17,0.04)';
  const step = 28;
  for(let x = 14; x < CW; x += step)
    for(let y = 14; y < CH; y += step){
      ctx.beginPath(); ctx.arc(x, y, 0.9, 0, Math.PI*2); ctx.fill();
    }

  // ── Animation phases ───────────────────────────────────────
  // 0.00 → 0.10 : coloured nodes float in scatter (already sized + tinted)
  // 0.10 → 0.85 : nodes drift onto the sphere; depth shading layers in
  // 0.30 → 0.90 : wireframe edges fade in
  const tMove  = smoothstep(0.10, 0.85, t);
  const tEdge  = smoothstep(0.30, 0.90, t);

  const movEase = eio(tMove);
  const time = pulse * 0.012;

  // Sphere rotates continually — gentle while scattered, steady when formed.
  rotY += 0.0015 + 0.0028 * tMove;
  rotX = Math.sin(pulse * 0.0006) * 0.18;   // subtle wobble

  const cx = CW / 2, cy = CH / 2;
  const sphereR = Math.min(CW, CH) * 0.36;

  const cosY = Math.cos(rotY), sinY = Math.sin(rotY);
  const cosX = Math.cos(rotX), sinX = Math.sin(rotX);

  // ── Project every node ──────────────────────────────────────
  const pos = G.nodes.map((n) => {
    let x3 = n.px * cosY + n.pz * sinY;
    let z3 = -n.px * sinY + n.pz * cosY;
    let y3 = n.py;
    const y4 = y3 * cosX - z3 * sinX;
    const z4 = y3 * sinX + z3 * cosX;
    y3 = y4; z3 = z4;

    const tx = cx + x3 * sphereR;
    const ty = cy + y3 * sphereR;

    const wanderAmp = (1 - tMove) * 0.012;
    const wx = Math.sin(time + n.fx) * wanderAmp;
    const wy = Math.cos(time + n.fy) * wanderAmp;
    const sxp = (n.sx + wx) * CW;
    const syp = (n.sy + wy) * CH;

    const x = lerp(sxp, tx, movEase);
    const y = lerp(syp, ty, movEase);
    return { x, y, depth: z3, n };
  });

  // ── Stray connection hints during scattered phase ──────────
  if(t < 0.55){
    const strayAlpha = (1 - smoothstep(0.10, 0.55, t)) * 0.18;
    if(strayAlpha > 0.005){
      ctx.strokeStyle = `rgba(120,120,130,${strayAlpha})`;
      ctx.lineWidth = 0.6;
      for(let i = 0; i < pos.length; i++){
        const j = (i * 7 + 3) % pos.length;
        if(j === i) continue;
        const dx = pos[i].x - pos[j].x;
        const dy = pos[i].y - pos[j].y;
        if(dx*dx + dy*dy < 220*220){
          ctx.beginPath();
          ctx.moveTo(pos[i].x, pos[i].y);
          ctx.lineTo(pos[j].x, pos[j].y);
          ctx.stroke();
        }
      }
    }
  }

  // ── Wireframe edges (depth-shaded, light gray) ─────────────
  if(tEdge > 0.01){
    G.edges.forEach(([a, b]) => {
      const pa = pos[a], pb = pos[b];
      if(!pa || !pb) return;
      const avgD = (pa.depth + pb.depth) * 0.5;
      const dShade = (avgD + 1) * 0.5;   // 0..1 (back..front)
      const baseA = tEdge * (0.15 + dShade * 0.55);
      ctx.strokeStyle = `rgba(170,175,190,${baseA})`;
      ctx.lineWidth = 0.55 + dShade * 0.35;
      ctx.beginPath();
      ctx.moveTo(pa.x, pa.y);
      ctx.lineTo(pb.x, pb.y);
      ctx.stroke();
    });
  }

  // ── Nodes (sorted back-to-front so front overlaps back) ────
  const sorted = pos.slice().sort((a, b) => a.depth - b.depth);
  sorted.forEach(({x, y, depth, n}) => {
    const dShade = (depth + 1) * 0.5;   // 0..1 (back..front)
    const teamCol = COLS[n.c] || COLS.neutral;

    // Size: full baseR while scattered (so hierarchy reads immediately),
    // depth-shaded sphere scale eases in as nodes settle.
    const sphereScale = 0.6 + dShade * 0.5;
    const r = n.baseR * lerp(1.0, sphereScale, movEase);

    // Alpha: visibly faint while scattered, ~100% when the orb settles.
    // (0.55 floor is the threshold below which the 0.35 stroke disappears
    // against white — at 0.30 the nodes vanished.)
    const formedAlpha = 0.85 + dShade * 0.15;   // 0.85 (back) – 1.00 (front)
    const alpha = lerp(0.55, formedAlpha, movEase);

    // Slightly more saturated fill so colors read on small nodes too
    // (pastel fills wash out at small sizes against the white background).
    const fillMix = n.tier === 0 ? 0.32 : (n.tier === 1 ? 0.18 : 0.10);
    const fill = mixHex(teamCol.f, teamCol.s, fillMix);

    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.arc(x, y, Math.max(0.6, r), 0, Math.PI*2);
    ctx.fillStyle = fill;
    ctx.fill();
    ctx.strokeStyle = teamCol.s;
    ctx.lineWidth = 0.35;
    ctx.stroke();
    ctx.globalAlpha = 1;
  });

  requestAnimationFrame(draw);
}

draw();

// ── Resize ──────────────────────────────────────────────────
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    setCanvasSize();
    G = buildNodes();
    updateProgress();
  }, 100);
});
</script>
</body>
</html>
